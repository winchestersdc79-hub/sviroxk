name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java 17 (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK locally
        working-directory: artifacts/mobile
        run: |
          eas build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ${{ github.workspace }}/sviroxk-v2.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sviroxk-apk-build-${{ github.run_number }}
          path: ${{ github.workspace }}/sviroxk-v2.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Get commit info
        id: info
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2-build-${{ github.run_number }}
          name: "Sviroxk v2.2 — Android APK — Build #${{ github.run_number }}"
          body: |
            ## 📱 Sviroxk Productivity — APK для Android

            ### Установка
            1. Скачай `sviroxk-v2.apk`
            2. На телефоне: Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой скачанный APK и установи

            **Commit:** `${{ steps.info.outputs.sha }}` | **Дата:** ${{ steps.info.outputs.date }}
          files: ${{ github.workspace }}/sviroxk-v2.apk
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
