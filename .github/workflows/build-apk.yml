name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль: preview = APK для тестов, production = финальный APK'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Собрать APK через EAS
    runs-on: ubuntu-latest
    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: ☕️ Настроить Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Настроить Android SDK
        uses: android-actions/setup-android@v3

      - name: Установить зависимости
        run: npm install

      - name: Настроить Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          # Токен не обязателен для локальной сборки (--local)
          token: ${{ secrets.EXPO_TOKEN }}
          patch-watchers: true

      - name: Собрать APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Собираем профиль: $PROFILE"
          # Используем --local для сборки прямо в GitHub Actions без необходимости в EXPO_TOKEN и EAS-серверах
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output ./student-app.apk

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: student-app-apk
          path: ./student-app.apk
          retention-days: 30

      - name: Создать GitHub Релиз
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Student App Release v${{ github.run_number }}"
          body: |
            ## Student App — Автоматическая сборка
            
            ### Основные функции:
            - Матрица Эйзенхауэра для управления задачами
            - Pomodoro-таймер для фокусировки
            - Трекер привычек
            - Статистика продуктивности
            - Календарь дедлайнов
            
            ### Установка:
            1. Скачайте `student-app.apk` ниже.
            2. Разрешите установку из неизвестных источников в настройках телефона.
            3. Установите и пользуйтесь!
          files: ./student-app.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
