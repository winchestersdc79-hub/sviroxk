name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        working-directory: artifacts/mobile
        run: eas build --platform android --profile preview --non-interactive --output ./sviroxk-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sviroxk-apk-${{ github.run_number }}
          path: artifacts/mobile/sviroxk-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Sviroxk v2.2 — Build #${{ github.run_number }}"
          body: |
            ## Sviroxk Productivity App — APK

            **Что нового:**
            - Уведомления о задачах, привычках и Pomodoro ✅
            - Кастомная иконка приложения 🎨
            - Редактирование задач (нажми и держи) ✏️
            - Выбор даты дедлайна с пикером 📅
            - Ежедневные мотивирующие цитаты 💬
            - Улучшенный экран привычек с недельной сеткой 📊
            - Трекинг фокус-времени в таймере ⏱
            - Выбор задачи в Pomodoro 🍅
            - Улучшенная статистика с фокус-сессиями 📈
            - Быстрое меню задачи (долгое нажатие) 👆

            **Commit:** ${{ steps.sha.outputs.short }}
          files: artifacts/mobile/sviroxk-release.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
