name: Собрать APK (Android)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль: preview = APK для тестов, production = финальный APK'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Собрать APK через EAS
    runs-on: ubuntu-latest
    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Установить зависимости
        run: npm install

      - name: Настроить Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Собрать APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Собираем профиль: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --output ./sviroxk.apk

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: sviroxk-${{ github.ref_name }}-apk
          path: ./sviroxk.apk
          retention-days: 30

      - name: Создать GitHub Релиз (только для тегов)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Sviroxk ${{ github.ref_name }}"
          body: |
            ## Sviroxk Productivity — ${{ github.ref_name }}
            
            ### Что нового в v2.1.0:
            - Матрица Эйзенхауэра с 4 квадрантами задач
            - Pomodoro-таймер с настраиваемыми длительностями
            - Трекер привычек с сериями и визуализацией
            - Статистика продуктивности: по квадрантам, приоритетам, за неделю
            - Календарь с отображением дедлайнов
            - Быстрые дедлайны при создании задач (сегодня, завтра, через неделю)
            - Поиск и фильтрация задач
            - Архив выполненных задач
            - Настройки Pomodoro таймера
            - Тёмная тема оформления
            
            ### Установка:
            1. Скачай `sviroxk.apk` ниже
            2. На телефоне: Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой скачанный файл и установи
          files: ./sviroxk.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
