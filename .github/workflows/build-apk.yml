name: Собрать APK (Android)

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      profile:
        description: 'Профиль: preview = APK для тестов, production = финальный APK'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Собрать APK через EAS
    runs-on: ubuntu-latest
    steps:
      - name: Клонировать репозиторий
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Установить зависимости
        run: npm install

      - name: Установить EAS CLI
        run: npm install -g eas-cli

      - name: Собрать APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Собираем профиль: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --output ./sviroxk.apk

      - name: Загрузить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: sviroxk-${{ github.ref_name }}-apk
          path: ./sviroxk.apk
          retention-days: 30

      - name: Создать GitHub Релиз (только для тегов)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Sviroxk ${{ github.ref_name }}"
          body: |
            ## 📱 Sviroxk Productivity — ${{ github.ref_name }}
            
            ### Что нового:
            - Матрица Эйзенхауэра с 4 квадрантами
            - Pomodoro-таймер с настройками
            - Трекер привычек со сериями
            - Статистика и аналитика
            - Поиск и архив задач
            - Экран настроек
            
            ### Установка:
            1. Скачай `sviroxk.apk` ниже
            2. На телефоне: Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой скачанный файл и установи
          files: ./sviroxk.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
