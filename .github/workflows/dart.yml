name: Flutter CI & Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Create android folder
        run: |
          flutter create --project-name productivity_app temp_project
          cp -r temp_project/android ./android
          rm -rf temp_project
      - name: Copy app icons
        run: |
          unzip AppIcons.zip -d app_icons
          ls app_icons/android/mipmap-mdpi/
          python3 -c "
          from PIL import Image
          import shutil
          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96, 'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for folder, size in sizes.items():
              img = Image.open(f'app_icons/android/{folder}/Sviroxk.png')
              img = img.resize((size, size))
              img.save(f'android/app/src/main/res/{folder}/ic_launcher.png')
          "
      - name: Build APK
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
