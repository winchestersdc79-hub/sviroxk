name: Flutter CI & Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Create Flutter Project Structure
        run: |
          flutter create --project-name productivity_app .
          
      - name: Copy app icons
        run: |
          unzip -o AppIcons.zip -d app_icons
          # Копируем иконки напрямую, если они есть в архиве
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          cp app_icons/android/mipmap-mdpi/Sviroxk.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp app_icons/android/mipmap-hdpi/Sviroxk.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp app_icons/android/mipmap-xhdpi/Sviroxk.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp app_icons/android/mipmap-xxhdpi/Sviroxk.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp app_icons/android/mipmap-xxxhdpi/Sviroxk.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true

      - name: Change app name and package
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Sviroxk"/g' android/app/src/main/AndroidManifest.xml
          
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sviroxk-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
