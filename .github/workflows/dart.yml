name: Flutter CI & Build APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Create android folder
        run: |
          flutter create --project-name productivity_app temp_project
          cp -r temp_project/android ./android
          rm -rf temp_project
      - name: Copy app icons
        run: |
          unzip AppIcons.zip -d app_icons
          cp app_icons/android/mipmap-mdpi/Sviroxk.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app_icons/android/mipmap-hdpi/Sviroxk.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app_icons/android/mipmap-xhdpi/Sviroxk.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app_icons/android/mipmap-xxhdpi/Sviroxk.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app_icons/android/mipmap-xxxhdpi/Sviroxk.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Build APK
        run: flutter build apk --release --no-shrink
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
