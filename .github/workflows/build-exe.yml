name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Patch app.json for desktop build (remove Replit origin)
        working-directory: artifacts/mobile
        run: |
          node -e "
          var fs = require('fs');
          var cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          cfg.expo.plugins = (cfg.expo.plugins || []).map(function(p) {
            if (Array.isArray(p) && p[0] === 'expo-router') return ['expo-router', {}];
            return p;
          });
          if (!cfg.expo.web) cfg.expo.web = {};
          cfg.expo.web.output = 'static';
          fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          console.log('app.json patched OK');
          "

      - name: Export Expo web build
        working-directory: artifacts/mobile
        run: npx expo export --platform web --output-dir web-export
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Copy web build to Electron app
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/desktop/web-build
          Copy-Item -Recurse -Force artifacts/mobile/web-export/* artifacts/desktop/web-build/
        shell: powershell

      - name: Copy app icon to desktop
        run: Copy-Item artifacts/mobile/assets/images/icon.png artifacts/desktop/icon.png
        shell: powershell

      - name: Install Electron dependencies
        working-directory: artifacts/desktop
        run: npm install

      - name: Build Windows EXE (NSIS installer + portable)
        working-directory: artifacts/desktop
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist output
        working-directory: artifacts/desktop
        run: dir dist
        shell: cmd

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sviroxk-windows-${{ github.run_number }}
          path: artifacts/desktop/dist/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Get build info
        id: info
        shell: bash
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v2.2-build-${{ github.run_number }}
          name: "🖥️ Sviroxk Desktop v2.2 — Windows — Build #${{ github.run_number }}"
          body: |
            ## 🖥️ Sviroxk Desktop — Установщик для Windows

            ### Файлы для скачивания
            | Файл | Описание |
            |------|----------|
            | `Sviroxk Setup *.exe` | **Установщик** — устанавливает как обычную программу, ярлык на рабочем столе |
            | `Sviroxk-*-portable.exe` | **Портативная** — запускается без установки |

            ### Установка
            1. Скачай `Sviroxk Setup X.X.X.exe`
            2. Запусти → нажми "Далее" → выбери папку → "Установить"
            3. Ярлык появится на Рабочем столе

            ### Что внутри
            - ✅ Матрица Эйзенхауэра (4 квадранта)
            - 📅 Календарь с дедлайнами
            - 🍅 Pomodoro таймер с трекингом
            - ✔️ Привычки со стриками и рекордами
            - 📊 Статистика продуктивности
            - 💬 Цитаты дня
            - 📎 Прикрепление фото к задачам
            - 💾 Данные хранятся локально, работает без интернета

            **Commit:** `${{ steps.info.outputs.sha }}` | **Дата:** ${{ steps.info.outputs.date }}
          files: artifacts/desktop/dist/*.exe
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
